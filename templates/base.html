<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EthioNex Marketplace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        
        .header {
            background: #2c3e50;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .logo a {
            color: white;
            text-decoration: none;
            cursor: pointer;
        }
        
        .nav {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .nav button {
            background: none;
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            font-family: inherit;
        }
        
        .nav button:hover {
            background: #34495e;
        }
        
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .btn-primary {
            background: #3498db;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2980b9;
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c0392b;
        }
        
        .btn-success {
            background: #27ae60;
            color: white;
        }
        
        .btn-warning {
            background: #f39c12;
            color: white;
        }
        
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        
        .product-card {
            background: white;
            border-radius: 10px;
            padding: 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .product-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 0.5rem;
            background: #f5f5f5;
        }

        .product-image-container {
            width: 100%;
            height: 180px;
            overflow: hidden;
            border-radius: 10px;
            margin-bottom: 0.5rem;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .product-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        
        .product-price {
            color: #27ae60;
            font-size: 1.3rem;
            font-weight: bold;
            margin: 0.5rem 0;
        }
        
        .product-rating {
            color: #f39c12;
            margin: 0.5rem 0;
        }
        
        .product-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        
        .form-container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        .cart-item {
            background: white;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .cart-total {
            text-align: right;
            font-size: 1.2rem;
            margin-top: 1rem;
            padding: 1rem;
            background: white;
            border-radius: 10px;
        }
        
        .message {
            padding: 1rem;
            margin: 1rem;
            border-radius: 5px;
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 1000;
            max-width: 300px;
        }
        
        .message-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            border-radius: 10px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: white;
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .stat-card h3 {
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }
        
        .stat-card p {
            font-size: 2rem;
            font-weight: bold;
        }
        
        .hero {
            text-align: center;
            padding: 3rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            color: white;
            margin-bottom: 2rem;
        }
        
        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        
        .loading {
            text-align: center;
            padding: 2rem;
            font-size: 1.2rem;
            color: #7f8c8d;
        }
        
        .filter-bar {
            background: white;
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 2rem;
        }
        
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        
        .user-name {
            background: #34495e;
            padding: 0.5rem 1rem;
            border-radius: 5px;
        }
        
        .logout-btn {
            background: #e74c3c !important;
        }
        
        .logout-btn:hover {
            background: #c0392b !important;
        }
        
        h1, h2 {
            color: #2c3e50;
            margin-bottom: 1rem;
        }
        
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
            
            .products-grid {
                grid-template-columns: 1fr;
            }
        }

        .order-filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 0.5rem;
        }

        .filter-btn {
            background: #6c757d;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .filter-btn:hover {
            background: #5a6268;
            transform: translateY(-1px);
        }

        .filter-btn.active {
            background: #007bff;
        }

        .order-card {
            transition: all 0.3s;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            background: white;
        }

        .order-card:hover {
            transform: translateX(5px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .order-cancelled {
            background: #fff5f5 !important;
            border-left: 4px solid #dc3545 !important;
            opacity: 0.85;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .empty-state p {
            margin-bottom: 1rem;
            color: #666;
        }

        #cart-count {
            background: #dc3545;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 12px;
            margin-left: 5px;
            display: none;
            font-weight: bold;
        }

        #search-suggestions {
            position: absolute;
            background: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        #search-suggestions div:hover {
            background: #f0f0f0;
        }

        .stock-status {
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        .stock-instock {
            color: #28a745;
        }

        .stock-lowstock {
            color: #ffc107;
        }

        .stock-outofstock {
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <a onclick="showHome()">🏪 EthioNex Marketplace</a>
        </div>
        <div class="nav">
            <button onclick="showHome()">🏠 Home</button>
            <button onclick="showProducts()">📦 Products</button>
            <button onclick="showCart()">🛒 Cart</button>
            <button onclick="showOrders()">📋 Orders</button>
            <button onclick="showWishlist()">❤️ Wishlist</button>
            <div id="seller-menu" style="display:none;">
                <button onclick="showSellerDashboard()">📊 Dashboard</button>
            </div>
            <div id="admin-menu" style="display:none;">
                <button onclick="showAdminDashboard()" style="background: #e67e22;">👑 Admin</button>
            </div>
            <div id="auth-buttons">
                <button onclick="showLogin()">🔐 Login</button>
                <button onclick="showRegister()">📝 Register</button>
            </div>
            <div id="user-info" style="display:none;">
                <span class="user-name" id="username-display"></span>
                <button class="logout-btn" onclick="logout()">🚪 Logout</button>
            </div>
        </div>
    </div>
    
    <div class="container" id="content">
        <div id="dynamic-content">
            <div class="loading">Loading...</div>
        </div>
    </div>
    
    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>Login</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="login-username" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Enter password">
            </div>
            <button class="btn btn-primary" onclick="login()">Login</button>
            <button class="btn" onclick="closeModal('loginModal')">Cancel</button>
            <div style="margin-top: 1rem; text-align: center;">
            <a href="#" onclick="showForgotPassword()" style="color: #3498db; text-decoration: none;">Forgot Password?</a>
            </div>
        </div>
    </div>
    
    <!-- Register Modal -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <h2>Register</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="reg-username" placeholder="Choose username">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="reg-phone" placeholder="0923069966">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Password">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="reg-password2" placeholder="Confirm password">
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="reg-is-seller"> Register as Seller
                </label> 
            </div>
            <button class="btn btn-primary" onclick="register()">Register</button>
            <button class="btn" onclick="closeModal('registerModal')">Cancel</button>
        </div>
    </div>
    
    <!-- Checkout Modal -->
    <div id="checkoutModal" class="modal">
        <div class="modal-content">
            <h2>Checkout Information</h2>
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="checkout-name" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Phone Number *</label>
                <input type="tel" id="checkout-phone" placeholder="09xxxxxxxx">
            </div>
            <div class="form-group">
                <label>Delivery Address *</label>
                <textarea id="checkout-address" rows="2" placeholder="Enter your address"></textarea>
            </div>
            <div class="form-group">
                <label>City *</label>
                <input type="text" id="checkout-city" value="Addis Ababa">
            </div>
            <div class="form-group">
                <label>Payment Method</label>
                <select id="checkout-payment">
                    <option value="cash">💵 Cash on Delivery</option>
                    <option value="telebirr">📱 Telebirr</option>
                    <option value="cbe">🏦 CBE Birr</option>
                </select>
            </div>
            <div style="border-top: 1px solid #ddd; padding-top: 1rem;">
                <h3>Total: <span id="checkout-total">0</span> ETB</h3>
                <small>+ 100 ETB delivery fee</small>
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                <button class="btn btn-success" onclick="submitOrder()">Place Order</button>
                <button class="btn" onclick="closeModal('checkoutModal')">Cancel</button>
            </div>
        </div>
    </div>

    <div id="message"></div>

    
    <script>
        const API_BASE = 'http://127.0.0.1:8000';
        let token = localStorage.getItem('token');
        
        // Initial load
        if (token) {
            document.getElementById('auth-buttons').style.display = 'none';
            document.getElementById('user-info').style.display = 'flex';
            fetchUserInfo();
        }
        
        showHome();
        
        function fetchUserInfo() {
            fetch(API_BASE + '/api/auth/profile/', {
                headers: {'Authorization': `Bearer ${token}`}
            })
            .then(response => response.json())
            .then(data => {
                if (data.username) {
                    document.getElementById('username-display').innerHTML = '👤 ' + data.username;
                    if (data.is_seller) {
                        document.getElementById('seller-menu').style.display = 'inline-block';
                    }
                    if (data.is_superuser) {
                        document.getElementById('admin-menu').style.display = 'inline-block';
                    }
                }
            })
            .catch(error => {
                console.error('Error fetching user info:', error);
                localStorage.removeItem('token');
                token = null;
                document.getElementById('auth-buttons').style.display = 'flex';
                document.getElementById('user-info').style.display = 'none';
            });
        }
        
        function showHome() {
            document.getElementById('dynamic-content').innerHTML = '<div class="loading">Loading...</div>';
            
            fetch(API_BASE + '/api/products/')
                .then(r => r.json())
                .then(products => {
                    const featured = products.slice(0, 4);
                    let html = `
                        <div class="hero">
                            <h1>Welcome to EthioNex Marketplace</h1>
                            <p>Ethiopia's Premier Online Marketplace</p>
                            <button class="btn btn-primary" onclick="showProducts()">Browse All Products →</button>
                        </div>
                        <h2>⭐ Featured Products</h2>
                        <div class="products-grid">
                    `;
                    
                    featured.forEach(product => {
                        let imageHtml = '<div class="product-image-container"><span>📦 No Image</span></div>';
                        if (product.image_url) {
                            imageHtml = `<div class="product-image-container"><img src="${product.image_url}" class="product-image"></div>`;
                        }
                        
                        html += `
                            <div class="product-card">
                                ${imageHtml}
                                <div class="product-title">${product.name}</div>
                                <div class="product-price">${parseInt(product.price).toLocaleString()} ETB</div>
                                <div class="product-rating">⭐ ${product.average_rating || 0}/5</div>
                                <p>${product.description ? product.description.substring(0, 80) : 'No description'}...</p>
                                <div class="product-actions">
                                    ${token ? `<button class="btn btn-primary" onclick="addToCart(${product.id})">🛒 Add to Cart</button>` : '<em>Login to purchase</em>'}
                                </div>
                            </div>
                        `;
                    });
                    
                    html += `</div>`;
                    document.getElementById('dynamic-content').innerHTML = html;
                })
                .catch(error => {
                    console.error('Error loading products:', error);
                    document.getElementById('dynamic-content').innerHTML = '<p>Error loading products. Make sure server is running.</p>';
                });
        }
        
        function showProducts() {
            const searchTerm = document.getElementById('search-input') ? document.getElementById('search-input').value : '';
            const categoryFilter = document.getElementById('category-filter') ? document.getElementById('category-filter').value : '';
            const sortBy = document.getElementById('sort-by') ? document.getElementById('sort-by').value : '';
            
            let url = API_BASE + `/api/products/?${searchTerm ? `search=${searchTerm}&` : ''}${categoryFilter ? `category=${categoryFilter}&` : ''}${sortBy ? `ordering=${sortBy}&` : ''}`;
            url = url.replace(/[&?]$/, '');
            
            document.getElementById('dynamic-content').innerHTML = '<div class="loading">Loading products...</div>';
            
            Promise.all([
                fetch(url).then(r => r.json()),
                fetch(API_BASE + '/api/categories/').then(r => r.json())
            ]).then(([products, categories]) => {
                let html = `
                    <h1>🛍️ All Products</h1>
                    
                    <div class="filter-bar">
                        <div class="filter-grid">
                            <div>
                                <label>🔍 Search</label>
                                <input type="text" id="search-input" placeholder="Search products..." style="width: 100%; padding: 0.5rem;" value="${searchTerm}">
                            </div>
                            <div>
                                <label>📂 Category</label>
                                <select id="category-filter" style="width: 100%; padding: 0.5rem;">
                                    <option value="">All Categories</option>
                                    ${categories.map(cat => `<option value="${cat.id}" ${categoryFilter == cat.id ? 'selected' : ''}>${cat.name}</option>`).join('')}
                                </select>
                            </div>
                            <div>
                                <label>📊 Sort By</label>
                                <select id="sort-by" style="width: 100%; padding: 0.5rem;">
                                    <option value="-created_at" ${sortBy === '-created_at' ? 'selected' : ''}>Newest First</option>
                                    <option value="price" ${sortBy === 'price' ? 'selected' : ''}>Price: Low to High</option>
                                    <option value="-price" ${sortBy === '-price' ? 'selected' : ''}>Price: High to Low</option>
                                    <option value="-views_count" ${sortBy === '-views_count' ? 'selected' : ''}>Most Popular</option>
                                </select>
                            </div>
                            <div style="display: flex; align-items: end;">
                                <button class="btn btn-primary" onclick="showProducts()" style="width: 100%;">Apply Filters</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="products-grid">
                `;
                
                if (products.length === 0) {
                    html += '<p style="text-align: center; grid-column: 1/-1;">No products found. Try different search terms.</p>';
                } else {
                    products.forEach(product => {
                        html += `
                            <div class="product-card">
                                <div style="width: 100%; height: 180px; overflow: hidden; border-radius: 5px; margin-bottom: 0.5rem;">
                                    ${product.image ? `<img src="${product.image}" style="width: 100%; height: 100%; object-fit: cover;">` : '<div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #ecf0f1;">📦 No Image</div>'}
                                </div>
                                <div class="product-title">${product.name}</div>
                                <div class="product-price">${parseInt(product.price).toLocaleString()} ETB</div>
                                <div class="product-rating">⭐ ${product.average_rating || 0}/5 (${product.total_reviews || 0} reviews)</div>
                                <p>${product.description ? product.description.substring(0, 60) : 'No description'}...</p>
                                <div class="product-actions">
                                    ${token ? `<button class="btn btn-primary" onclick="addToCart(${product.id})">🛒 Add to Cart</button>
                                    <button class="btn btn-warning" onclick="addToWishlist(${product.id})">❤️ Wishlist</button>
                                    <button class="btn" onclick="showProductDetail(${product.id})">👁️ View</button>` : '<em>Login to purchase</em>'}
                                </div>
                            </div>
                        `;
                    });
                }
                
                html += `</div><p style="margin-top: 1rem; text-align: center;">Found ${products.length} product(s)</p>`;
                document.getElementById('dynamic-content').innerHTML = html;
            }).catch(error => {
                console.error('Error loading products:', error);
                document.getElementById('dynamic-content').innerHTML = '<p>Error loading products. Please refresh the page.</p>';
            });
        }
        
        function showProductDetail(productId) {
            document.getElementById('dynamic-content').innerHTML = '<div class="loading">Loading product details...</div>';
            
            Promise.all([
                fetch(API_BASE + `/api/products/${productId}/`).then(r => r.json()),
                fetch(API_BASE + `/api/products/${productId}/reviews/`).then(r => r.json())
            ]).then(([product, reviews]) => {
                let imageHtml = '<div style="background: #ecf0f1; border-radius: 10px; padding: 2rem; text-align: center;">📦 No Image Available</div>';
                if (product.image_url) {
                    imageHtml = `<img src="${product.image_url}" style="width: 100%; border-radius: 10px;">`;
                }
                
                let html = `
                    <button class="btn" onclick="showProducts()" style="margin-bottom: 1rem;">← Back to Products</button>
                    
                    <div style="background: white; border-radius: 10px; padding: 2rem;">
                        <h1>${product.name}</h1>
                        
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; margin-top: 1rem;">
                            <div>
                                ${imageHtml}
                                <div style="background: #ecf0f1; border-radius: 10px; padding: 1rem; text-align: center; margin-top: 1rem;">
                                    <div class="product-price" style="font-size: 2rem;">${parseInt(product.price).toLocaleString()} ETB</div>
                                    <div class="product-rating">⭐ ${product.average_rating || 0}/5 (${product.total_reviews || 0} reviews)</div>
                                </div>
                            </div>
                            
                            <div>
                                <h3>Description</h3>
                                <p>${product.description || 'No description available.'}</p>
                                
                                <h3>Details</h3>
                                <ul style="list-style: none; padding: 0;">
                                    <li>📦 Condition: ${product.condition || 'N/A'}</li>
                                    <li>📊 Views: ${product.views_count || 0}</li>
                                    <li>📅 Added: ${new Date(product.created_at).toLocaleDateString()}</li>
                                    <li>👤 Seller: ${product.seller || 'Unknown'}</li>
                                </ul>

                showMessage('Please enter phone number', 'error');
                return;
            }
            if (!password) {
                showMessage('Please enter password', 'error');
                return;
            }
            if (password !== password2) {
                showMessage('Passwords do not match', 'error');
                return;
            }
            
            const data = {
                username: username,
                email: email,
                phone_number: phone,
                password: password,
                password_confirm: password2,
                is_seller: document.getElementById('reg-is-seller').checked
            };
            
            fetch(API_BASE + '/api/auth/register/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            })
            .then(r => r.json())
            .then(data => {
                // Check if access token exists (successful registration)
                if (data.access) {
                    token = data.access;
                    localStorage.setItem('token', token);
                    closeModal('registerModal');
                    document.getElementById('auth-buttons').style.display = 'none';
                    document.getElementById('user-info').style.display = 'block';
                    fetchUserInfo();
                    showMessage('✅ Registration successful! Welcome ' + data.user.username, 'success');
                    showHome();
                    // Clear form
                    document.getElementById('reg-username').value = '';
                    document.getElementById('reg-email').value = '';
                    document.getElementById('reg-phone').value = '';
                    document.getElementById('reg-password').value = '';
                    document.getElementById('reg-password2').value = '';
                    document.getElementById('reg-is-seller').checked = false;
                } else {
                    // Show error message from response
                    let errorMsg = 'Registration failed';
                    if (data.username) errorMsg += ': ' + data.username[0];
                    else if (data.email) errorMsg += ': ' + data.email[0];
                    else if (data.password) errorMsg += ': ' + data.password[0];
                    else errorMsg += ': ' + JSON.stringify(data);
                    showMessage(errorMsg, 'error');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showMessage('Registration failed. Please try again.', 'error');
            });
        }
        
        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerHTML = `<div class="message message-${type}">${msg}</div>`;
            setTimeout(() => {
                msgDiv.innerHTML = '';
            }, 3000);
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }
        
        function showAdminDashboard() {
            if (!token) {
                showMessage('Please login first', 'error');
                showLogin();
                return;
            }
            
            document.getElementById('dynamic-content').innerHTML = '<div class="loading">Loading admin dashboard...</div>';
            
            fetch(API_BASE + '/api/admin/dashboard/', {
                headers: {'Authorization': `Bearer ${token}`}
            })
            .then(r => r.json())
            .then(data => {
                let html = `
                    <h1>👑 Admin Dashboard</h1>
                    
                    <div class="stats-grid">
                        <div class="stat-card" style="background: #3498db; color: white;">
                            <h3>👥 Users</h3>
                            <p>${data.users.total}</p>
                            <small>${data.users.sellers} sellers</small>
                        </div>
                        <div class="stat-card" style="background: #27ae60; color: white;">
                            <h3>📦 Products</h3>
                            <p>${data.products.total}</p>
                            <small>${data.products.categories} categories</small>
                        </div>
                        <div class="stat-card" style="background: #e67e22; color: white;">
                            <h3>💰 Revenue</h3>
                            <p>${parseInt(data.orders.total_revenue).toLocaleString()} ETB</p>
                            <small>This week: ${parseInt(data.orders.weekly_revenue).toLocaleString()} ETB</small>
                        </div>
                        <div class="stat-card" style="background: #9b59b6; color: white;">
                            <h3>⭐ Rating</h3>
                            <p>${data.reviews.average_rating}/5</p>
                            <small>${data.reviews.total} reviews</small>
                        </div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1rem; margin-bottom: 2rem;">
                        <div class="stat-card">
                            <h3>📊 Orders Overview</h3>
                            <p>Total: ${data.orders.total}</p>
                            <p>Pending: ${data.orders.pending}</p>
                            <p>Completed: ${data.orders.completed}</p>
                            <hr>
                            <p>Monthly Revenue: ${parseInt(data.orders.monthly_revenue).toLocaleString()} ETB</p>
                        </div>
                        <div class="stat-card">
                            <h3>⚠️ Inventory Alerts</h3>
                            <p>Out of Stock: ${data.products.out_of_stock}</p>
                            <p>Low Stock (&lt;5): ${data.products.low_stock}</p>
                        </div>
                    </div>
                    
                    <h2>📋 Recent Orders</h2>
                    <div class="products-grid">
                `;
                
                data.recent_orders.forEach(order => {
                    html += `
                        <div class="cart-item">
                            <div>
                                <strong>Order #${order.order_number}</strong><br>
                                Customer: ${order.customer}<br>
                                Date: ${order.date}
                            </div>
                            <div>
                                ${parseInt(order.total).toLocaleString()} ETB<br>
                                Status: <span style="color: ${order.status === 'delivered' ? 'green' : 'orange'}">${order.status}</span>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div>
                    <h2>🏆 Top Selling Products</h2>
                    <div class="products-grid">
                `;
                
                data.top_products.forEach(product => {
                    html += `
                        <div class="cart-item">
                            <div>
                                <strong>${product.name}</strong>
                            </div>
                            <div>
                                Sold: ${product.total_sold} units<br>
                                Revenue: ${parseInt(product.revenue).toLocaleString()} ETB
                            </div>
                        </div>
                    `;
                });
                
                html += `</div>`;
                document.getElementById('dynamic-content').innerHTML = html;
            })
            .catch(error => {
                document.getElementById('dynamic-content').innerHTML = '<p>You need admin privileges to view this page.</p>';
            });
        }
        
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }
    </script>
</body>
</html>
