<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EthioNex Marketplace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        
        .header {
            background: #2c3e50;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .logo a {
            color: white;
            text-decoration: none;
            cursor: pointer;
        }
        
        .nav {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .nav button {
            background: none;
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            font-family: inherit;
        }
        
        .nav button:hover {
            background: #34495e;
        }
        
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .btn-primary {
            background: #3498db;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2980b9;
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c0392b;
        }
        
        .btn-success {
            background: #27ae60;
            color: white;
        }
        
        .btn-warning {
            background: #f39c12;
            color: white;
        }
        
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        
        .product-card {
            background: white;
            border-radius: 10px;
            padding: 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .product-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 0.5rem;
            background: #ecf0f1;
        }
        
        .product-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        
        .product-price {
            color: #27ae60;
            font-size: 1.3rem;
            font-weight: bold;
            margin: 0.5rem 0;
        }
        
        .product-rating {
            color: #f39c12;
            margin: 0.5rem 0;
        }
        
        .product-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        
        .form-container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        .cart-item {
            background: white;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .cart-total {
            text-align: right;
            font-size: 1.2rem;
            margin-top: 1rem;
            padding: 1rem;
            background: white;
            border-radius: 10px;
        }
        
        .message {
            padding: 1rem;
            margin: 1rem;
            border-radius: 5px;
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 1000;
            max-width: 300px;
        }
        
        .message-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            margin: 10% auto;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            border-radius: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: white;
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .stat-card h3 {
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }
        
        .stat-card p {
            font-size: 2rem;
            font-weight: bold;
        }
        
        .hero {
            text-align: center;
            padding: 3rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            color: white;
            margin-bottom: 2rem;
        }
        
        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        
        .loading {
            text-align: center;
            padding: 2rem;
            font-size: 1.2rem;
            color: #7f8c8d;
        }
        
        .filter-bar {
            background: white;
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 2rem;
        }
        
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        
        .user-name {
            background: #34495e;
            padding: 0.5rem 1rem;
            border-radius: 5px;
        }
        
        .logout-btn {
            background: #e74c3c !important;
        }
        
        .logout-btn:hover {
            background: #c0392b !important;
        }
        
        h1, h2 {
            color: #2c3e50;
            margin-bottom: 1rem;
        }
        
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
            
            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <a onclick="showHome()">🏪 EthioNex Marketplace</a>
        </div>
        <div class="nav">
            <button onclick="showHome()">🏠 Home</button>
            <button onclick="showProducts()">📦 Products</button>
            <button onclick="showCart()">🛒 Cart</button>
            <button onclick="showOrders()">📋 Orders</button>
            <button onclick="showWishlist()">❤️ Wishlist</button>
            <div id="seller-menu" style="display:none;">
                <button onclick="showSellerDashboard()">📊 Dashboard</button>
            </div>
            <div id="admin-menu" style="display:none;">
                <button onclick="showAdminDashboard()" style="background: #e67e22;">👑 Admin</button>
            </div>
            <div id="auth-buttons">
                <button onclick="showLogin()">🔐 Login</button>
                <button onclick="showRegister()">📝 Register</button>
            </div>
            <div id="user-info" style="display:none;">
                <span class="user-name" id="username-display"></span>
                <button class="logout-btn" onclick="logout()">🚪 Logout</button>
            </div>
        </div>
    </div>
    
    <div class="container" id="content">
        <div id="dynamic-content">
            <div class="loading">Loading...</div>
        </div>
    </div>
    
    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>Login</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="login-username" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Enter password">
            </div>
            <button class="btn btn-primary" onclick="login()">Login</button>
            <button class="btn" onclick="closeModal('loginModal')">Cancel</button>
        </div>
    </div>
    
    <!-- Register Modal -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <h2>Register</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="reg-username" placeholder="Choose username">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="reg-phone" placeholder="0912345678">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Password">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="reg-password2" placeholder="Confirm password">
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="reg-is-seller"> Register as Seller
                </label>
            </div>
            <button class="btn btn-primary" onclick="register()">Register</button>
            <button class="btn" onclick="closeModal('registerModal')">Cancel</button>
        </div>
    </div>
    
    <div id="message"></div>
    
    <script>
        let token = localStorage.getItem('token');
        
        // Initial load
        if (token) {
            document.getElementById('auth-buttons').style.display = 'none';
            document.getElementById('user-info').style.display = 'flex';
            fetchUserInfo();
        }
        
        showHome();
        
     function fetchUserInfo() {
            fetch('/api/auth/profile/', {
                headers: {'Authorization': `Bearer ${token}`}
            })
            .then(response => response.json())
            .then(data => {
                if (data.username) {
                    document.getElementById('username-display').innerHTML = '👤 ' + data.username;
                    if (data.is_seller) {
                        document.getElementById('seller-menu').style.display = 'inline-block';
                    }
                    if (data.is_superuser) {
                        document.getElementById('admin-menu').style.display = 'inline-block';
                    }
                }
            })
            .catch(error => {
                console.error('Error fetching user info:', error);
                localStorage.removeItem('token');
                token = null;
                document.getElementById('auth-buttons').style.display = 'flex';
                document.getElementById('user-info').style.display = 'none';
            });
        }
        
        function showHome() {
            document.getElementById('dynamic-content').innerHTML = '<div class="loading">Loading...</div>';
            
            fetch('/api/products/')
                .then(r => r.json())
                .then(products => {
                    const featured = products.slice(0, 4);
                    let html = `
                        <div class="hero">
                            <h1>Welcome to EthioNex Marketplace</h1>
                            <p>Ethiopia's Premier Online Marketplace</p>
                            <button class="btn btn-primary" onclick="showProducts()">Browse All Products →</button>
                        </div>
                        <h2>⭐ Featured Products</h2>
                        <div class="products-grid">
                    `;
                    
                    featured.forEach(product => {
                        html += `
                            <div class="product-card">
                                ${product.image ? `<img src="${product.image}" class="product-image" alt="${product.name}">` : '<div class="product-image" style="display: flex; align-items: center; justify-content: center;">📦 No Image</div>'}
                                <div class="product-title">${product.name}</div>
                                <div class="product-price">${parseInt(product.price).toLocaleString()} ETB</div>
                                <div class="product-rating">⭐ ${product.average_rating || 0}/5</div>
                                <p>${product.description ? product.description.substring(0, 80) : 'No description'}...</p>
                                <div class="product-actions">
                                    ${token ? `<button class="btn btn-primary" onclick="addToCart(${product.id})">🛒 Add to Cart</button>` : '<em>Login to purchase</em>'}
                                </div>
                            </div>
                        `;
                    });
                    
                    html += `</div>`;
                    document.getElementById('dynamic-content').innerHTML = html;
                });
        }
        
        function showProducts() {
            const searchTerm = document.getElementById('search-input') ? document.getElementById('search-input').value : '';
            const categoryFilter = document.getElementById('category-filter') ? document.getElementById('category-filter').value : '';
            const sortBy = document.getElementById('sort-by') ? document.getElementById('sort-by').value : '';
            
            let url = `/api/products/?${searchTerm ? `search=${searchTerm}&` : ''}${categoryFilter ? `category=${categoryFilter}&` : ''}${sortBy ? `ordering=${sortBy}&` : ''}`;
            url = url.replace(/[&?]$/, '');
            
            document.getElementById('dynamic-content').innerHTML = '<div class="loading">Loading products...</div>';
            
            Promise.all([
                fetch(url).then(r => r.json()),
                fetch('/api/categories/').then(r => r.json())
            ]).then(([products, categories]) => {
                let html = `
                    <h1>🛍️ All Products</h1>
                    
                    <div class="filter-bar">
                        <div class="filter-grid">
                            <div>
                                <label>🔍 Search</label>
                                <input type="text" id="search-input" placeholder="Search products..." style="width: 100%; padding: 0.5rem;" value="${searchTerm}">
                            </div>
                            <div>
                                <label>📂 Category</label>
                                <select id="category-filter" style="width: 100%; padding: 0.5rem;">
                                    <option value="">All Categories</option>
                                    ${categories.map(cat => `<option value="${cat.id}" ${categoryFilter == cat.id ? 'selected' : ''}>${cat.name}</option>`).join('')}
                                </select>
                            </div>
                            <div>
                                <label>📊 Sort By</label>
                                <select id="sort-by" style="width: 100%; padding: 0.5rem;">
                                    <option value="-created_at" ${sortBy === '-created_at' ? 'selected' : ''}>Newest First</option>
                                    <option value="price" ${sortBy === 'price' ? 'selected' : ''}>Price: Low to High</option>
                                    <option value="-price" ${sortBy === '-price' ? 'selected' : ''}>Price: High to Low</option>
                                    <option value="-views_count" ${sortBy === '-views_count' ? 'selected' : ''}>Most Popular</option>
                                </select>
                            </div>
                            <div style="display: flex; align-items: end;">
                                <button class="btn btn-primary" onclick="showProducts()" style="width: 100%;">Apply Filters</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="products-grid">
                `;
                
                if (products.length === 0) {
                    html += '<p style="text-align: center; grid-column: 1/-1;">No products found. Try different search terms.</p>';
                } else {
                    products.forEach(product => {
                        html += `
                            <div class="product-card">
                                ${product.image ? `<img src="${product.image}" class="product-image" alt="${product.name}">` : '<div class="product-image" style="display: flex; align-items: center; justify-content: center;">📦 No Image</div>'}
                                <div class="product-title">${product.name}</div>
                                <div class="product-price">${parseInt(product.price).toLocaleString()} ETB</div>
                                <div class="product-rating">⭐ ${product.average_rating || 0}/5 (${product.total_reviews || 0} reviews)</div>
                                <p>${product.description ? product.description.substring(0, 80) : 'No description'}...</p>
                                <div class="product-actions">
                                    ${token ? `<button class="btn btn-primary" onclick="addToCart(${product.id})">🛒 Add to Cart</button>
                                    <button class="btn btn-warning" onclick="addToWishlist(${product.id})">❤️ Wishlist</button>
                                    <button class="btn" onclick="showProductDetail(${product.id})">👁️ View</button>` : '<em>Login to purchase</em>'}
                                </div>
                            </div>
                        `;
                    });
                }
                
                html += `</div><p style="margin-top: 1rem; text-align: center;">Found ${products.length} product(s)</p>`;
                document.getElementById('dynamic-content').innerHTML = html;
            });
        }
        
        function showProductDetail(productId) {
            document.getElementById('dynamic-content').innerHTML = '<div class="loading">Loading product details...</div>';
            
            Promise.all([
                fetch(`/api/products/${productId}/`).then(r => r.json()),
                fetch(`/api/products/${productId}/reviews/`).then(r => r.json())
            ]).then(([product, reviews]) => {
                let html = `
                    <button class="btn" onclick="showProducts()" style="margin-bottom: 1rem;">← Back to Products</button>
                    
                    <div style="background: white; border-radius: 10px; padding: 2rem;">
                        <h1>${product.name}</h1>
                        
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; margin-top: 1rem;">
                            <div>
                                ${product.image ? `<img src="${product.image}" style="width: 100%; border-radius: 10px;">` : '<div style="background: #ecf0f1; border-radius: 10px; padding: 2rem; text-align: center;">📦 No Image Available</div>'}
                                <div style="background: #ecf0f1; border-radius: 10px; padding: 1rem; text-align: center; margin-top: 1rem;">
                                    <div class="product-price" style="font-size: 2rem;">${parseInt(product.price).toLocaleString()} ETB</div>
                                    <div class="product-rating">⭐ ${product.average_rating || 0}/5 (${product.total_reviews || 0} reviews)</div>
                                </div>
                            </div>
                            
                            <div>
                                <h3>Description</h3>
                                <p>${product.description || 'No description available.'}</p>
                                
                                <h3>Details</h3>
                                <ul style="list-style: none; padding: 0;">
                                    <li>📦 Condition: ${product.condition || 'N/A'}</li>
                                    <li>📊 Views: ${product.views_count || 0}</li>
                                    <li>📅 Added: ${new Date(product.created_at).toLocaleDateString()}</li>
                                    <li>👤 Seller: ${product.seller || 'Unknown'}</li>
                                </ul>
                                
                                <div class="product-actions" style="margin-top: 1rem;">
                                    ${token ? `
                                        <button class="btn btn-primary" onclick="addToCart(${product.id})">🛒 Add to Cart</button>
                                        <button class="btn btn-warning" onclick="addToWishlist(${product.id})">❤️ Add to Wishlist</button>
                                    ` : '<em>Login to purchase this product</em>'}
                                </div>
                            </div>
                        </div>
                        
                        <h2 style="margin-top: 2rem;">📝 Customer Reviews</h2>
                        <div id="reviews-section">
                `;
                
                if (reviews.length === 0) {
                    html += '<p>No reviews yet. Be the first to review this product!</p>';
                } else {
                    reviews.forEach(review => {
                        html += `
                            <div style="background: #f8f9fa; padding: 1rem; border-radius: 5px; margin-bottom: 1rem;">
                                <strong>${review.user_name}</strong>
                                <span style="color: #f39c12;">${'⭐'.repeat(review.rating)}</span>
                                <p style="margin-top: 0.5rem;">${review.comment}</p>
                                <small>${new Date(review.created_at).toLocaleDateString()}</small>
                            </div>
                        `;
                    });
                }
                
                if (token) {
                    html += `
                        <div style="margin-top: 2rem; padding: 1rem; background: #f8f9fa; border-radius: 10px;">
                            <h3>Write a Review</h3>
                            <div class="form-group">
                                <label>Rating</label>
                                <select id="review-rating" style="width: 100%; padding: 0.5rem;">
                                    <option value="5">⭐⭐⭐⭐⭐ - Excellent</option>
                                    <option value="4">⭐⭐⭐⭐ - Good</option>
                                    <option value="3">⭐⭐⭐ - Average</option>
                                    <option value="2">⭐⭐ - Poor</option>
                                    <option value="1">⭐ - Terrible</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Comment</label>
                                <textarea id="review-comment" rows="3" style="width: 100%; padding: 0.5rem;"></textarea>
                            </div>
                            <button class="btn btn-primary" onclick="submitReview(${product.id})">Submit Review</button>
                        </div>
                    `;
                }
                
                html += `</div></div>`;
                document.getElementById('dynamic-content').innerHTML = html;
            });
        }
        
        function submitReview(productId) {
            const rating = document.getElementById('review-rating').value;
            const comment = document.getElementById('review-comment').value;
            
            if (!comment.trim()) {
                showMessage('Please enter a comment', 'error');
                return;
            }
            
            fetch(`/api/products/${productId}/reviews/`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({rating: parseInt(rating), comment: comment})
            })
            .then(r => r.json())
            .then(data => {
                if (data.id) {
                    showMessage('✅ Review submitted successfully!', 'success');
                    showProductDetail(productId);
                } else {
                    showMessage('Error submitting review', 'error');
                }
            });
        }
        
        function addToCart(productId) {
            if (!token) {
                showMessage('Please login first', 'error');
                showLogin();
                return;
            }
            
            fetch('/api/cart/add/', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({product_id: productId, quantity: 1})
            })
            .then(r => r.json())
            .then(data => {
                showMessage('✅ ' + (data.message || 'Added to cart'), 'success');
            });
        }
        
        function addToWishlist(productId) {
            if (!token) {
                showMessage('Please login first', 'error');
                showLogin();
                return;
            }
            
            fetch('/api/wishlist/add/', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({product_id: productId})
            })
            .then(r => r.json())
            .then(data => {
                showMessage('✅ ' + (data.message || 'Added to wishlist'), 'success');
            });
        }
        
        function showCart() {
            if (!token) {
                showMessage('Please login first', 'error');
                showLogin();
                return;
            }
            
            document.getElementById('dynamic-content').innerHTML = '<div class="loading">Loading cart...</div>';
            
            fetch('/api/cart/', {headers: {'Authorization': `Bearer ${token}`}})
                .then(r => r.json())
                .then(cart => {
                    let html = '<h2>🛒 Your Shopping Cart</h2>';
                    if (!cart.items || cart.items.length === 0) {
                        html += '<p>Your cart is empty.</p>';
                    } else {
                        cart.items.forEach(item => {
                            html += `
                                <div class="cart-item">
                                    <div>
                                        <strong>${item.product_details.name}</strong><br>
                                        ${item.quantity} × ${parseInt(item.product_details.price).toLocaleString()} ETB
                                    </div>
                                    <div>
                                        Subtotal: ${parseInt(item.subtotal).toLocaleString()} ETB<br>
                                        <button class="btn btn-danger" onclick="removeFromCart(${item.id})">Remove</button>
                                    </div>
                                </div>
                            `;
                        });
                        html += `
                            <div class="cart-total">
                                <h3>Total: ${parseInt(cart.total_price).toLocaleString()} ETB</h3>
                                <button class="btn btn-success" onclick="checkout()">Proceed to Checkout</button>
                            </div>
                        `;
                    }
                    document.getElementById('dynamic-content').innerHTML = html;
                });
        }
        
        function removeFromCart(itemId) {
            fetch(`/api/cart/remove/${itemId}/`, {
                method: 'DELETE',
                headers: {'Authorization': `Bearer ${token}`}
            })
            .then(() => {
                showMessage('Item removed', 'success');
                showCart();
            });
        }
        
        function showWishlist() {
            if (!token) {
                showMessage('Please login first', 'error');
                showLogin();
                return;
            }
            
            document.getElementById('dynamic-content').innerHTML = '<div class="loading">Loading wishlist...</div>';
            
            fetch('/api/wishlist/', {headers: {'Authorization': `Bearer ${token}`}})
                .then(r => r.json())
                .then(items => {
                    let html = '<h2>❤️ Your Wishlist</h2>';
                    if (items.length === 0) {
                        html += '<p>Your wishlist is empty.</p>';
                    } else {
                        html += '<div class="products-grid">';
                        items.forEach(item => {
                            html += `
                                <div class="product-card">
                                    ${item.product_details.image ? `<img src="${item.product_details.image}" class="product-image">` : '<div class="product-image" style="display: flex; align-items: center; justify-content: center;">📦 No Image</div>'}
                                    <div class="product-title">${item.product_details.name}</div>
                                    <div class="product-price">${parseInt(item.product_details.price).toLocaleString()} ETB</div>
                                    <button class="btn btn-primary" onclick="addToCart(${item.product_details.id})">Add to Cart</button>
                                </div>
                            `;
                        });
                        html += '</div>';
                    }
                    document.getElementById('dynamic-content').innerHTML = html;
                });
        }
        
        function showOrders() {
            if (!token) {
                showMessage('Please login first', 'error');
                showLogin();
                return;
            }
            
            document.getElementById('dynamic-content').innerHTML = '<div class="loading">Loading orders...</div>';
            
            fetch('/api/orders/', {headers: {'Authorization': `Bearer ${token}`}})
                .then(r => r.json())
                .then(orders => {
                    let html = '<h2>📋 Your Orders</h2>';
                    if (orders.length === 0) {
                        html += '<p>No orders yet.</p>';
                    } else {
                        orders.forEach(order => {
                            html += `
                                <div class="cart-item">
                                    <div>
                                        <strong>Order #${order.order_number}</strong><br>
                                        Status: <span style="color: ${order.status === 'delivered' ? 'green' : 'orange'}">${order.status}</span><br>
                                        Date: ${order.created_at.substring(0, 10)}
                                    </div>
                                    <div>
                                        Total: ${parseInt(order.total).toLocaleString()} ETB
                                    </div>
                                </div>
                            `;
                        });
                    }
                    document.getElementById('dynamic-content').innerHTML = html;
                });
        }
        
        function checkout() {
            const orderData = {
                payment_method: 'cash',
                full_name: 'Customer',
                phone_number: '0912345678',
                address: 'Addis Ababa',
                city: 'Addis Ababa',
                delivery_fee: 100
            };
            
            fetch('/api/orders/', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(orderData)
            })
            .then(r => r.json())
            .then(data => {
                if (data.order_number) {
                    showMessage(`✅ Order ${data.order_number} created!`, 'success');
                    showOrders();
                } else {
                    showMessage('Checkout failed', 'error');
                }
            });
        }
        
        function showSellerDashboard() {
            if (!token) {
                showMessage('Please login first', 'error');
                showLogin();
                return;
            }
            
            document.getElementById('dynamic-content').innerHTML = '<div class="loading">Loading dashboard...</div>';
            
            Promise.all([
                fetch('/api/seller/dashboard/', {headers: {'Authorization': `Bearer ${token}`}}).then(r => r.json()),
                fetch('/api/seller/products/', {headers: {'Authorization': `Bearer ${token}`}}).then(r => r.json())
            ]).then(([dashboard, products]) => {
                let html = `
                    <h1>📊 Seller Dashboard</h1>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <h3>📦 Products</h3>
                            <p>${dashboard.total_products || 0}</p>
                        </div>
                        <div class="stat-card">
                            <h3>💰 Revenue</h3>
                            <p>${parseInt(dashboard.total_revenue || 0).toLocaleString()} ETB</p>
                        </div>
                        <div class="stat-card">
                            <h3>⭐ Rating</h3>
                            <p>${dashboard.average_rating || 0}/5</p>
                        </div>
                    </div>
                    <h2>Your Products</h2>
                    <button class="btn btn-success" onclick="showAddProduct()" style="margin-bottom: 1rem;">➕ Add New Product</button>
                    <div class="products-grid">
                `;
                
                if (products.length === 0) {
                    html += '<p>No products yet. Click "Add New Product" to get started.</p>';
                } else {
                    products.forEach(product => {
                        html += `
                            <div class="product-card">
                                ${product.image ? `<img src="${product.image}" class="product-image">` : '<div class="product-image" style="display: flex; align-items: center; justify-content: center;">📦 No Image</div>'}
                                <div class="product-title">${product.name}</div>
                                <div class="product-price">${parseInt(product.price).toLocaleString()} ETB</div>
                                <p>Stock: ${product.quantity || 0}</p>
                            </div>
                        `;
                    });
                }
                
                html += `</div>`;
                document.getElementById('dynamic-content').innerHTML = html;
            }).catch(() => {
                document.getElementById('dynamic-content').innerHTML = '<p>You need to be a seller to view this page. Contact admin to become a seller.</p>';
            });
        }
        
        function showAddProduct() {
            let html = `
                <h2>➕ Add New Product</h2>
                <div class="form-container">
                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text" id="product-name" placeholder="Enter product name">
                    </div>
                    <div class="form-group">
                        <label>Price (ETB)</label>
                        <input type="number" id="product-price" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="product-description" rows="3" placeholder="Product description..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" id="product-quantity" value="1">
                    </div>
                    <div class="form-group">
                        <label>Product Image</label>
                        <input type="file" id="product-image" accept="image/*">
                    </div>
                    <div class="form-group">
                        <label>Condition</label>
                        <select id="product-condition">
                            <option value="new">New</option>
                            <option value="like_new">Like New</option>
                            <option value="good">Good</option>
                            <option value="fair">Fair</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Category ID</label>
                        <input type="number" id="product-category" value="1">
                    </div>
                    <button class="btn btn-success" onclick="createProductWithImage()">Create Product</button>
                    <button class="btn" onclick="showSellerDashboard()">Cancel</button>
                </div>
            `;
            document.getElementById('dynamic-content').innerHTML = html;
        }
        
        function createProductWithImage() {
            const formData = new FormData();
            formData.append('name', document.getElementById('product-name').value);
            formData.append('price', parseFloat(document.getElementById('product-price').value));
            formData.append('description', document.getElementById('product-description').value);
            formData.append('quantity', parseInt(document.getElementById('product-quantity').value));
            formData.append('condition', document.getElementById('product-condition').value);
            formData.append('category', parseInt(document.getElementById('product-category').value));
            formData.append('slug', document.getElementById('product-name').value.toLowerCase().replace(/ /g, '-'));
            formData.append('is_available', true);
            
            const imageFile = document.getElementById('product-image').files[0];
            if (imageFile) {
                formData.append('image', imageFile);
            }
            
            fetch('/api/products/', {
                method: 'POST',
                headers: {'Authorization': `Bearer ${token}`},
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                if (data.id) {
                    showMessage('✅ Product created successfully!', 'success');
                    showSellerDashboard();
                } else {
                    showMessage('Error creating product: ' + JSON.stringify(data), 'error');
                }
            })
            .catch(error => {
                showMessage('Error creating product', 'error');
            });
        }
        
        function showLogin() {
            document.getElementById('loginModal').style.display = 'block';
        }
        
        function login() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            
            if (!username || !password) {
                showMessage('Please enter username and password', 'error');
                return;
            }
            
            fetch('/api/auth/login/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            })
            .then(r => r.json())
            .then(data => {
                if (data.access) {
                    token = data.access;
                    localStorage.setItem('token', token);
                    closeModal('loginModal');
                    document.getElementById('auth-buttons').style.display = 'none';
                    document.getElementById('user-info').style.display = 'flex';
                    fetchUserInfo();
                    showMessage('✅ Login successful! Welcome ' + username, 'success');
                    showHome();
                    document.getElementById('login-username').value = '';
                    document.getElementById('login-password').value = '';
                } else {
                    showMessage('Login failed: Invalid credentials', 'error');
                }
            })
            .catch(error => {
                showMessage('Login failed. Make sure server is running.', 'error');
            });
        }
        
        function logout() {
            localStorage.removeItem('token');
            token = null;
            document.getElementById('auth-buttons').style.display = 'flex';
            document.getElementById('user-info').style.display = 'none';
            document.getElementById('seller-menu').style.display = 'none';
            document.getElementById('username-display').innerHTML = '';
            showMessage('Logged out successfully', 'success');
            showHome();
        }
        
        function showRegister() {
            document.getElementById('registerModal').style.display = 'block';
        }
        
        function register() {
            const password = document.getElementById('reg-password').value;
            const password2 = document.getElementById('reg-password2').value;
            
            if (password !== password2) {
                showMessage('Passwords do not match', 'error');
                return;
            }
            
            if (password.length < 8) {
                showMessage('Password must be at least 8 characters', 'error');
                return;
            }
            
            const data = {
                username: document.getElementById('reg-username').value,
                email: document.getElementById('reg-email').value,
                phone_number: document.getElementById('reg-phone').value,
                password: password,
                password_confirm: password2,
                is_seller: document.getElementById('reg-is-seller').checked
            };
            
            fetch('/api/auth/register/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            })
            .then(r => r.json())
            .then(data => {
                if (data.access) {
                    token = data.access;
                    localStorage.setItem('token', token);
                    closeModal('registerModal');
                    document.getElementById('auth-buttons').style.display = 'none';
                    document.getElementById('user-info').style.display = 'flex';
                    fetchUserInfo();
                    showMessage('✅ Registration successful! Welcome ' + data.user.username, 'success');
                    showHome();
                } else {
                    let errorMsg = 'Registration failed';
                    if (data.username) errorMsg += ': ' + data.username[0];
                    else if (data.email) errorMsg += ': ' + data.email[0];
                    else if (data.password) errorMsg += ': ' + data.password[0];
                    showMessage(errorMsg, 'error');
                }
            });
        }
        
        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerHTML = `<div class="message message-${type}">${msg}</div>`;
            setTimeout(() => {
                msgDiv.innerHTML = '';
            }, 3000);
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }
        
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }
        function showAdminDashboard() {
            if (!token) {
                showMessage('Please login first', 'error');
                showLogin();
                return;
            }
            
            document.getElementById('dynamic-content').innerHTML = '<div class="loading">Loading admin dashboard...</div>';
            
            fetch('/api/admin/dashboard/', {
                headers: {'Authorization': `Bearer ${token}`}
            })
            .then(r => r.json())
            .then(data => {
                let html = `
                    <h1>👑 Admin Dashboard</h1>
                    
                    <div class="stats-grid">
                        <div class="stat-card" style="background: #3498db; color: white;">
                            <h3>👥 Users</h3>
                            <p>${data.users.total}</p>
                            <small>${data.users.sellers} sellers</small>
                        </div>
                        <div class="stat-card" style="background: #27ae60; color: white;">
                            <h3>📦 Products</h3>
                            <p>${data.products.total}</p>
                            <small>${data.products.categories} categories</small>
                        </div>
                        <div class="stat-card" style="background: #e67e22; color: white;">
                            <h3>💰 Revenue</h3>
                            <p>${parseInt(data.orders.total_revenue).toLocaleString()} ETB</p>
                            <small>This week: ${parseInt(data.orders.weekly_revenue).toLocaleString()} ETB</small>
                        </div>
                        <div class="stat-card" style="background: #9b59b6; color: white;">
                            <h3>⭐ Rating</h3>
                            <p>${data.reviews.average_rating}/5</p>
                            <small>${data.reviews.total} reviews</small>
                        </div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1rem; margin-bottom: 2rem;">
                        <div class="stat-card">
                            <h3>📊 Orders Overview</h3>
                            <p>Total: ${data.orders.total}</p>
                            <p>Pending: ${data.orders.pending}</p>
                            <p>Completed: ${data.orders.completed}</p>
                            <hr>
                            <p>Monthly Revenue: ${parseInt(data.orders.monthly_revenue).toLocaleString()} ETB</p>
                        </div>
                        <div class="stat-card">
                            <h3>⚠️ Inventory Alerts</h3>
                            <p>Out of Stock: ${data.products.out_of_stock}</p>
                            <p>Low Stock (&lt;5): ${data.products.low_stock}</p>
                        </div>
                    </div>
                    
                    <h2>📋 Recent Orders</h2>
                    <div class="products-grid">
                `;
                
                data.recent_orders.forEach(order => {
                    html += `
                        <div class="cart-item">
                            <div>
                                <strong>Order #${order.order_number}</strong><br>
                                Customer: ${order.customer}<br>
                                Date: ${order.date}
                            </div>
                            <div>
                                ${parseInt(order.total).toLocaleString()} ETB<br>
                                Status: <span style="color: ${order.status === 'delivered' ? 'green' : 'orange'}">${order.status}</span>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div>
                    <h2>🏆 Top Selling Products</h2>
                    <div class="products-grid">
                `;
                
                data.top_products.forEach(product => {
                    html += `
                        <div class="cart-item">
                            <div>
                                <strong>${product.name}</strong>
                            </div>
                            <div>
                                Sold: ${product.total_sold} units<br>
                                Revenue: ${parseInt(product.revenue).toLocaleString()} ETB
                            </div>
                        </div>
                    `;
                });
                
                html += `</div>`;
                document.getElementById('dynamic-content').innerHTML = html;
            })
            .catch(error => {
                document.getElementById('dynamic-content').innerHTML = '<p>You need admin privileges to view this page.</p>';
            });
        }
    </script>
</body>
</html>
