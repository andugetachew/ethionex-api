[flake8]
max-line-length = 120
max-complexity = 12
exclude =
    migrations,
    venv,
    .git,
    __pycache__,
    staticfiles,
    media,
    scripts,
    add_products.py,
    create_products.py,
    restore_products.py
ignore =
    W503,
    W293,
    W291,
    W292,
    W391,
    E402,
    E501,
    E731,
    F811,
    F403,
    F405,
    F401,
    C901,
     E111,
    E117,
    E122,
    E301,
    E302,
    E303,
    E305,
    E306,
    F541,
    F841
per-file-ignores =
    tests/*:F401,F841
    */migrations/*:ALL